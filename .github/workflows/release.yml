name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Full package validation
        run: bash tests/validate-package.sh
      - name: Schema validation
        run: python3 tests/validate-schema.py

  release:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          NORI_VERSION=$(python3 -c "import json; print(json.load(open('nori.json'))['version'])")
          if [ "$TAG_VERSION" != "$NORI_VERSION" ]; then
            echo "ERROR: tag version v${TAG_VERSION} != nori.json version ${NORI_VERSION}"
            exit 1
          fi
          echo "Version ${TAG_VERSION} is consistent — proceeding with release"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
