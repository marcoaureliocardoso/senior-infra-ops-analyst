name: Scheduled Maintenance

on:
  schedule:
    # NOTE: job conditionals below match these cron strings.
    # If you change a cron expression, update the corresponding job `if:`.
    - cron: '17 7 * * 1'
    - cron: '37 9 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-audit:
    if: github.event.schedule == '17 7 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Link validation
        id: links
        run: |
          bash tests/validate-links.sh --json 2>&1 | tee link-report.json
        continue-on-error: true

      - name: Auto-fix candidates (Level 1)
        id: autofix
        run: |
          bash tests/auto-fix-links.sh link-report.json 2>&1 | tee auto-fix-report.json
        continue-on-error: true

      - name: Manage link-audit issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 tests/link-audit-issue.py

      - name: Upload link report artifact
        uses: actions/upload-artifact@v4
        with:
          name: link-health-${{ github.run_id }}
          path: link-report.json
          retention-days: 90

  full-validation:
    if: github.event.schedule == '37 9 1 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Full package validation
        run: bash tests/validate-package.sh
      - name: Schema validation
        run: python3 tests/validate-schema.py
      - name: CI workflow self-check
        run: bash tests/validate-ci-workflows.sh
