name: Scheduled Maintenance

on:
  schedule:
    # NOTE: job conditionals below match these cron strings.
    # If you change a cron expression, update the corresponding job `if:`.
    - cron: '17 7 * * 1'
    - cron: '37 9 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-audit:
    if: github.event.schedule == '17 7 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Link validation
        id: links
        run: |
          bash tests/validate-links.sh --json 2>&1 | tee link-report.json
        continue-on-error: true

      - name: Create issue from report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import json, os, subprocess

          with open('link-report.json') as f:
              report = json.load(f)

          broken = report.get('broken_urls', [])
          if not broken:
              print('No broken URLs in report, skipping issue creation')
              exit(0)

          lines = ['## Broken external links detected',
                   '',
                   f'Checked **{report[\"checked\"]}** URLs across all markdown files. '
                   f'**{len(broken)}** are unreachable.',
                   '',
                   '| Status | URL |',
                   '|--------|-----|']
          for entry in broken:
              lines.append(f'| {entry[\"code\"]} | {entry[\"url\"]} |')

          lines += ['',
                    '### How to fix',
                    '',
                    '1. Verify if the link is permanently moved or temporarily down',
                    '2. Update the URL in the source markdown file',
                    f'3. [View full CI run]({os.environ[\"RUN_URL\"]}) for detailed logs',
                    '',
                    '> Auto-generated by scheduled link audit. Run: bash tests/validate-links.sh']

          body = '\n'.join(lines)

          # Update existing open link-audit issue or create new one
          existing = subprocess.run(
              ['gh', 'issue', 'list', '--label', 'links', '--state', 'open', '--limit', '1', '--json', 'number'],
              capture_output=True, text=True
          )
          issues = json.loads(existing.stdout) if existing.stdout.strip() else []
          if issues:
              num = issues[0]['number']
              subprocess.run(['gh', 'issue', 'comment', str(num), '--body', body], check=True)
              print(f'Commented on existing issue #{num}')
          else:
              title = f'🔗 Broken external links — {subprocess.run([\"date\", \"+%Y-%m-%d\"], capture_output=True, text=True).stdout.strip()}'
              subprocess.run(['gh', 'issue', 'create', '--title', title, '--body', body, '--label', 'maintenance', '--label', 'links'], check=True)
              print('Created new issue')
          "

  full-validation:
    if: github.event.schedule == '37 9 1 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Full package validation
        run: bash tests/validate-package.sh
      - name: Schema validation
        run: python3 tests/validate-schema.py
      - name: CI workflow self-check
        run: bash tests/validate-ci-workflows.sh
