name: Validate skillset

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * 1'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Local package validation
        run: bash tests/validate-package.sh
      - name: Live link validation
        run: bash tests/validate-links.sh
